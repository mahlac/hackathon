name: Build-Scan-Push-Deploy
on: [push]

jobs:
  pipeline:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SCAN: Uses a containerized scanner
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # 2. BUILD & PUSH: Push to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Images
        run: |
          docker build -t mahdocker/patient-service:latest ./patient-service
          docker build -t mahdocker/appointment-service:latest ./appointment-service
          docker push mahdocker/patient-service:latest
          docker push mahdocker/appointment-service:latest

      # 3. DEPLOY: Pull from Docker Hub into Minikube
      - name: Start Minikube & Deploy
        uses: medyagh/setup-minikube@latest
      - run: |
          kubectl apply -f k8s/deploy.yaml
          kubectl apply -f k8s/ingress.yaml
          # Wait for rollout
          kubectl rollout status deployment/patient-service

