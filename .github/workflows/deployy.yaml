name: Hospital App Secure Deploy
on: [push]

jobs:
  pipeline:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        run: |
          docker run --rm \
            --network="host" \
            -v "$(pwd):/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=Test \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/patient-service:latest ./patient-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/appointment-service:latest ./appointment-service
          docker push ${{ secrets.DOCKER_USERNAME }}/patient-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/appointment-service:latest

      - name: Deploy to Local Minikube
        run: |
          # Ensure Ingress addon is active
          #minikube addons enable ingress
          
          # Apply Kubernetes configurations
          kubectl apply -f k8s/deploy.yaml
          kubectl apply -f k8s/ingress.yaml
          
          # Restart deployments to pull 'latest' images from Docker Hub
          kubectl rollout restart deployment/patient-service
          kubectl rollout restart deployment/appointment-service
          
          # Wait for confirmation
          kubectl rollout status deployment/patient-service --timeout=60s
          kubectl rollout status deployment/appointment-service --timeout=60s

      - name: Verification
        run: |
          echo "Access your services at:"
          echo "https://hospital.local"
          echo "https://hospital.local"

